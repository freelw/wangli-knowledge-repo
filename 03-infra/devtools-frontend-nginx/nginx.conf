server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index inspector.html;

    location = / {
        rewrite ^ /inspector.html last;
    }

    location / {
        try_files $uri =404;
    }

    location ~* \.(?:js|css|html|json|svg|png|jpg|jpeg|gif|webp|avif|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 1h;
        add_header Cache-Control "public";
    }
}
